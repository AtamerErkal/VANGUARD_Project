name: VANGUARD CI — Model Regression Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      # ── Lint ──────────────────────────────────────────────────────────────────
      - name: Lint (ruff)
        run: |
          pip install ruff -q
          ruff check backend/main.py backend/kalman.py retrain.py --select E,F --ignore E501

      # ── Import smoke test ─────────────────────────────────────────────────────
      - name: Backend import test
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          # Models may not exist in CI — override load to avoid crash
          import unittest.mock as m
          with m.patch('joblib.load'), m.patch('torch.load', return_value={}):
              pass
          print('Import structure OK')
          "

      # ── Dataset generation ────────────────────────────────────────────────────
      - name: Generate dataset & verify shape
        run: |
          python -c "
          from retrain import generate_dataset, CLASS_COUNTS
          df = generate_dataset()
          expected = sum(CLASS_COUNTS.values())
          assert len(df) == expected, f'Expected {expected} rows, got {len(df)}'
          assert 'classification' in df.columns
          assert df['classification'].nunique() == 6
          print(f'Dataset OK: {len(df)} rows, {df.columns.tolist()}')
          "

      # ── Full retrain + F1 regression gate ─────────────────────────────────────
      # Runs only on push to main (not PRs) to avoid slow CI on every commit.
      - name: Retrain & F1 regression gate (main branch only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p models data
          python retrain.py 2>&1 | tee retrain.log
          python -c "
          import re, sys
          log = open('retrain.log').read()
          m = re.search(r'F1 Macro:\s+([\d.]+)%', log)
          if not m:
              print('Could not parse F1 from log')
              sys.exit(1)
          f1 = float(m.group(1)) / 100
          print(f'F1 Macro: {f1:.4f}')
          if f1 < 0.90:
              print(f'FAIL: F1 {f1:.4f} < 0.90 regression threshold')
              sys.exit(1)
          print('PASS: F1 above threshold')
          "

      - name: Upload MLflow artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-runs
          path: mlruns/
          retention-days: 30
